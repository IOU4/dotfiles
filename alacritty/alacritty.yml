font:
    normal:
        family: JetBrains Mono Nerd Font
        style: Medium 
    bold:
        family: JetBrains Mono Nerd Font
        style: Bold
    italic:
        family: JetBrains Mono Nerd Font
        style: Italic
    bold_italic:
        family: JetBrains Mono Nerd Font
        style: Bold Italic    
    size: 12

window:
